<!DOCTYPE html>
<html>
<head>
    <title>Nested Tables</title>
    <style>
		
        table {
            width: 100%;
        }
        td, th {
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }
        .inner-table {
            width: 100%;
        }
        .black-cell {
            background-color: black;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

<table>
    <!-- Row 1 -->
    <tr>
        <!-- Nested Table 2 -->
        <td>
            <table class="inner-table">
                <tr>
                    <th colspan="2">Nested Table 2</th>
                </tr>
                <tr>
                    <th>Column 1</th>
                    <th>Column 2</th>
                </tr>
                <tr>
                    <td>abc</td>
                    <td>def</td>
                </tr>
            </table>
        </td>

        <!-- Nested Table 1 -->
        <td>
            <table class="inner-table">
                <tr>
                    <th>Nested Table 1</th>
                </tr>
                <tr>
                    <td>
                        <ul style="text-align:left;">
                            <li>List item 1</li>
                            <li>List item 2</li>
                            <li>List item 3</li>
                        </ul>
                    </td>
                </tr>
            </table>
        </td>
    </tr>

    <!-- Row 2 -->
    <tr>
        <!-- Nested Table 3 -->
        <td>
            <table class="inner-table">
                <tr>
                    <th colspan="2">Nested Table 3</th>
                </tr>
                <tr>
                    <td><a href="#">Nested Table</a></td>
                    <td>Demo Continued</td>
                </tr>
            </table>
        </td>

        <!-- Nested Table 4 -->
        <td>
            <table class="inner-table">
                <tr>
                    <th>Nested Table 4</th>
                </tr>
                <tr>
                    <td class="black-cell">HTML</td>
                </tr>
            </table>
        </td>
    </tr>
</table>

</body>
</html>
